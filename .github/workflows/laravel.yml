name: Laravel Docker CI

on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Laravel Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: rayonsoleil/gestion-scolarite-app:latest

      - name: Push MySQL Image to my Hub
        run: |
          docker pull mysql:8.0
          docker tag mysql:8.0 rayonsoleil/gestion-scolarite-db:latest
          docker push rayonsoleil/gestion-scolarite-db:latest